<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaLa - Katalog [Foto] Langit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">KaLa Koleksi.</div>
        <p class="subtitle">Koleksi sudut langit, alam, dan keindahannya. You can use for personal purpose only not commercial.</p>
        <p class="subtitle">Dikelola oleh @avcintiaaa_</p>
    </header>

    <main class="gallery-container">
        
        <div class="gallery-item">
            <img src="golden-hour-comfort.jpeg" alt="Golden Hour Comfort" onclick="openModal('langit-senja.jpg')">

            <div class="item-info">
                <h3>Golden Hour Comfort</h3>
                <a href="golden-hour-comfort.jpeg" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <div class="gallery-item">
            <div class="image-placeholder">
                <span class="placeholder-text">Foto Langit 2</span>
            </div>
            <div class="item-info">
                <h3>Sunny Day</h3>
                <a href="#" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <div class="gallery-item">
            <div class="image-placeholder">
                <span class="placeholder-text">Foto Langit 3</span>
            </div>
            <div class="item-info">
                <h3>Gloomy Sky</h3>
                <a href="#" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <div class="gallery-item">
            <div class="image-placeholder">
                <span class="placeholder-text">Foto Langit 4</span>
            </div>
            <div class="item-info">
                <h3>Pink Sunset</h3>
                <a href="#" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <!-- Elemen Modal Pop-up untuk melihat foto Full -->
    <div id="skyModal" class="lightbox-modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgFullView">
    </div>

    <!-- Script JavaScript Singkat untuk Logic Klik -->
    <script>
        function openModal(imageSrc) {
            var modal = document.getElementById("skyModal");
            var modalImg = document.getElementById("imgFullView");
            
            modal.style.display = "flex"; // Tampilkan modal
            modalImg.src = imageSrc;      // Masukkan foto full sesuai yang diklik
        }

        function closeModal() {
            var modal = document.getElementById("skyModal");
            modal.style.display = "none"; // Sembunyikan kembali modal
        }
    </script>
</body>

    </main>

    <footer>
        <p>&copy; 2026 Katalog Langit.</p>
    </footer>

</body>
</html>
