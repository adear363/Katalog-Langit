<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaLa - Katalog [Foto] Langit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">KaLa Koleksi.</div>
        <p class="subtitle">Koleksi sudut langit, alam, dan keindahannya. You can use for personal purpose only not commercial.</p>
        <p class="subtitle">Dikelola oleh @avcintiaaa_</p>
    
        <div class="search-box"><input
        type="text" id="searchInput" placeholder="🔍 misal: golden, sunset..." onkeyup="searchPhotos()"> 
        </div>
    </header>

    <main class="gallery-container">
        
        <div class="gallery-item">
            <img src="golden-hour-comfort.jpeg" alt="Golden Hour Comfort" onclick="openModal('golden-hour-comfort.jpeg')">
            <div class="item-info">
                <h3>Golden Hour Comfort</h3>
                <a href="golden-hour-comfort.jpeg" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <div class="gallery-item">
            <img src="dark-blue-sunset.jpeg" alt="Dark Blue Sunset" onclick="openModal('dark-blue-sunset.jpeg)">
            <div class="item-info">
                <h3>Dark Blue Sunset</h3>
                <a href="dark-blue-sunset.jpeg" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <div class="gallery-item">
            <div class="image-placeholder">
                <span class="placeholder-text">Foto Langit 3</span>
            </div>
            <div class="item-info">
                <h3>Gloomy Sky</h3>
                <a href="#" class="btn-download" download>Unduh</a>
            </div>
        </div>

        <div class="gallery-item">
            <div class="image-placeholder">
                <span class="placeholder-text">Foto Langit 4</span>
            </div>
            <div class="item-info">
                <h3>Pink Sunset</h3>
                <a href="#" class="btn-download" download>Unduh</a>
            </div>
        </div>

    </main> <div id="skyModal" class="lightbox-modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgFullView">
    </div>

    <footer>
        <p>&copy; 2026 Katalog Langit.</p>
    </footer>

    <script>
        function openModal(imageSrc) {
            var modal = document.getElementById("skyModal");
            var modalImg = document.getElementById("imgFullView");
            
            modal.style.display = "flex"; 
            modalImg.src = imageSrc;      
        }

        function closeModal() {
            var modal = document.getElementById("skyModal");
            modal.style.display = "none"; 
        }
    </script>

    <script>
        function searchPhotos() {
    let filter = document.getElementById("searchInput").value.toLowerCase();
    let items = document.querySelectorAll(".gallery-item");

    items.forEach(item => {
        let title = item.querySelector("h3").innerText.toLowerCase();
        item.style.display = title.includes(filter) ? "flex" : "none";
    });
}
    </script>

</body> </html>
